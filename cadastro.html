<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="cadastro.css">
    <script defer src="cadastro.js"></script>
    <title>Tela de cadastro</title>
</head>
<body>
    <main>
        <section>
            <div id="form-box " class="form-box">  
                <h1 id="texto-login" class="texto-login">Faça Login</h1>
                <form id="form" class="form">
                    <label for="inputEmail">Email</label>
                    <input type="text" id="inputEmail" name="campoEmail" required placeholder="seuemail@email.email"/>
                    <label for="inputSenha">Senha</label>
                    <input type="password" id="inputSenha" name="campoSenha" required placeholder="67890"/>
                    <label for="inputCpf">CPF</label>
                    <input type="text" id="inputCpf" name="campoCpf" required placeholder="###.###.###-##"/>
                    <label for="inputTel">Telefone</label>
                    <input type="text" id="inputTel" name="campoTel" required placeholder="(XX) XXXXX-XXXX"/>
                    <div id="feedback" class="feedback"></div>
                    <button id="btn-entrar">Entrar</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
