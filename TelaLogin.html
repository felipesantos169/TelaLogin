<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="TelaLogin.css">
    <script defer src="TelaLogin.js"></script>
    <title>Tela de Login</title>
</head>
<body>
    <main>
        <section>
            <div id="form-box " class="form-box">  
                <h1 id="texto-login" class="texto-login">Faça Login</h1>
                <form class="form">
                    <label for="inputNome">Nome</label>
                    <input type="text" id="inputNome" name="campoNome" required placeholder="Felipe dos Santos"/>
                    <label for="inputSenha">Senha</label>
                    <input type="password" id="inputSenha" name="campoSenha" required placeholder="67890"/>
                    <button id="btn-enviar">Enviar</button>
                </form>
            </div>
        </section>
    </main>
</body>
</html>
